monitor=,preferred,auto,1

# Execute your favorite apps at launch
# exec-once = waybar & hyprpaper & firefox

# Source a file (multi-file configs)
# source = ~/.config/hypr/myColors.conf

# Set programs that you use
$terminal = foot
$fileManager = pcmanfm
$menu = fuzzel
#$upvol =   pactl set-sink-volume @DEFAULT_SINK@ +5%
#$downvol = pactl set-sink-volume @DEFAULT_SINK@ -5%
#$mutevol = pactl set-sink-mute @DEFAULT_SINK@ toggle


# Some default env vars.
env = XCURSOR_SIZE,0
env = QT_QPA_PLATFORMTHEME,qt6ct # change to qt6ct if you have that

# For all categories, see https://wiki.hyprland.org/Configuring/Variables/
input {
    kb_layout = us
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =
    kb_options = caps:swapescape
    follow_mouse = 1

    touchpad {
        natural_scroll = no
    }

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.
}

general {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    gaps_in = 10
    gaps_out = 10
    border_size = 1
    col.active_border = rgba(33ccffee) rgba(00ff99ee) 45deg
    col.inactive_border = rgba(595959aa)

    layout = dwindle
    layout = floating

    # Please see https://wiki.hyprland.org/Configuring/Tearing/ before you turn this on
    allow_tearing = true
}

decoration {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more

    rounding = 1

    blur {
        enabled = true
        size = 4
        passes = 1
    }

    drop_shadow = yes
    shadow_range = 0
    shadow_render_power = 3
    col.shadow = rgba(1a1a1aee)
}

animations {
    enabled = yes

    # Some default animations, see https://wiki.hyprland.org/Configuring/Animations/ for more

    bezier = myBezier, 0.05, 0.9, 0.1, 1.05

    animation = windows, 1, 7, myBezier
    animation = windowsOut, 1, 7, default, popin 80%
    animation = border, 1, 10, default
    animation = borderangle, 1, 8, default
    animation = fade, 1, 7, default
    animation = workspaces, 1, 6, default
}

dwindle {
    # See https://wiki.hyprland.org/Configuring/Dwindle-Layout/ for more
    pseudotile = yes # master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = yes # you probably want this
}

master {
    # See https://wiki.hyprland.org/Configuring/Master-Layout/ for more
    new_is_master = true
}

gestures {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    workspace_swipe = off
}

misc {
    # See https://wiki.hyprland.org/Configuring/Variables/ for more
    force_default_wallpaper = 1 # Set to 0 or 1 to disable the anime mascot wallpapers
}

# Example per-device config
# See https://wiki.hyprland.org/Configuring/Keywords/#executing for more
#device:epic-mouse-v1 {
#    sensitivity = -0.5
#}

# Example windowrule v1
# windowrule = float, ^(kitty)$
# Example windowrule v2
# windowrulev2 = float,class:^(kitty)$,title:^(kitty)$
# See https://wiki.hyprland.org/Configuring/Window-Rules/ for more
#windowrulev2 = nomaximizerequest, class:.* # You'll probably like this.


# See https://wiki.hyprland.org/Configuring/Keywords/ for more
$mainMod = SUPER

# Example binds, see https://wiki.hyprland.org/Configuring/Binds/ for more
bind = $mainMod, Return, exec, $terminal
bind = $mainMod, Q, killactive,
bind = $mainMod, W, exec, firefox
bind = $mainMod  CONTROL, Backspace, exit,
bind = $mainMod SHIFT,  A, exec, $fileManager
bind = $mainMod, A, exec, foot lf
bind = $mainMod, Y, togglefloating,
bind = $mainMod, D, exec, $menu
bind = $mainMod, P, pseudo, # dwindle
bind = $mainMod, comcommaa, togglesplit, # dwindle
bind = $mainMod, X, exec, swl -b
bind = $mainMod, C, exec, swl
bind = $mainMod  CONTROL, X, exec, swl -cfb
bind = $mainMod  CONTROL, C, exec, swl -cf
bind = $mainMod  ALT, X, exec, swl -b10
bind = $mainMod  ALT, C, exec, swl -f10
bind = $mainMod  SHIFT, X, exec, swl2
bind = $mainMod  SHIFT, C, exec, swl2 -b
bind = $mainMod, period, exec, swl -r
bind = $mainMod, Home, exec, /home/pc/scripts/layout
bind = $mainMod, M, exec, /home/pc/scripts/s2
bind = $mainMod, V, exec, hyprlock & sudo systemctl suspend
bind = $mainMod, R, exec, foot sudo htop
bind = $mainMod, N, exec, foot nvim
bind = $mainMod, G, exec, qbittorrent
bind = $mainMod, E, exec, foot ncmpcpp
bind = , Print, exec, scrot /home/pc/Pictures/scr/1.jpg
bind = , XF86Display, exec, arandr
bind = , XF86LaunchA, exec, thunderbird
bind = , XF86Search, exec, fsearch
bind = , XF86Explorer, exec, waypaper
bind = , XF86Tools, exec, lxappearance
bind = $mainMod SHIFT, E, exec, mpc update
bind = $mainMod, bracketleft, exec, mpc seek -5
bind = $mainMod SHIFT, bracketleft, exec, mpc prev
bind = $mainMod, bracketright, exec, mpc toggle
bind = $mainMod SHIFT, bracketright, exec, mpc stop
bind = $mainMod, backslash, exec, mpc seek +5
bind = $mainMod SHIFT, backslash, exec, mpc next
bind = $mainMod, F, fullscreen
bind = $mainMod, Z, exec, hyprlock


# Move focus with mainMod + arrow keys
bind = $mainMod, J, movefocus, l
bind = $mainMod, K, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

#bind = XF86AudioRaiseVolume, exec, $upvol
#bind = XF86AudioLowerVolume, exec, $downvol
#bind = XF86AudioMute,        exec, $mutevol
#bind = XF86AudioMicMute,     exec pactl, set-source-mute, @DEFAULT_SOURCE@ toggle,
bind = , XF86MonBrightnessUp, exec, brightnessctl, set, 10%+
bind = , XF86MonBrightnessDown, exec, brightnessctl, set, 10%-
bind = $mainMod , XF86AudioRaiseVolume, exec, pamixer -i 1
bind = , XF86AudioRaiseVolume, exec, volume up
bind = $mainMod , XF86AudioLowerVolume, exec, pamixer -d 1
bind = , XF86AudioLowerVolume, exec, volume down
bind = , XF86AudioMicMute, exec, rofi -show powermenu -modi powermenu:rofi-power-menu
bind = $mainMod , XF86AudioMicMute, exec, amixer -D pulse sset Capture toggle
bind = , XF86AudioMute, exec, volume mute
bind = $mainMod , XF86AudioMute, exec, foot pulsemixer
# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

#waybar

#waypaper --restore

exec-once = waybar & waypaper --restore

windowrule = size 600 200, title:(Enter name)(.*)$
windowrule = float, title:(Enter name)(.*)$
windowrule = move center, title:(Enter name)(.*)$
